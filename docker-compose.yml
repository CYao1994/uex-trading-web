version: '3.8'

services:
  uex-trading:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/terminals?q=test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
