name: Sync Hangar Timer

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync with xyxyll reference
        run: node scripts/sync-hangar-timer.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/components/HangarTimer.jsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync hangar timer [skip ci]"
            git push
          fi
